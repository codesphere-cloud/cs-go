name: Integration Tests

on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC
  workflow_call:

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        label: [workspace, list, error-handling, log, pipeline, git, wakeup, curl, local, unlabeled]
    name: Integration Tests (${{ matrix.label }})
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6
        with:
          go-version-file: 'go.mod'

      - name: Warn about unlabeled tests
        if: matrix.label == 'unlabeled'
        run: echo "::warning::Running tests without a known label. If tests are found here, please add a label to the Describe block."

      - name: Run integration tests
        env:
          CS_TOKEN: ${{ matrix.label != 'local' && secrets.CS_TOKEN || '' }}
          CS_API: ${{ matrix.label != 'local' && secrets.CS_API || '' }}
          CS_TEAM_ID: ${{ matrix.label != 'local' && secrets.CS_TEAM_ID || '' }}
        run: make test-int-${{ matrix.label }}

  integration-tests-cleanup:
    runs-on: ubuntu-latest
    needs: integration-tests
    if: always()
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6
        with:
          go-version-file: 'go.mod'

      - name: Build CLI
        run: make build

      - name: Cleanup Orphaned Test Resources
        env:
          CS_TOKEN: ${{ secrets.CS_TOKEN }}
          CS_API: ${{ secrets.CS_API }}
          CS_TEAM_ID: ${{ secrets.CS_TEAM_ID }}
        run: |
          echo "Cleaning up any orphaned test workspaces..."
          ./cs list workspaces -t $CS_TEAM_ID | grep -E "cli-(test|git-test|pipeline-test|log-test|sync-test|open-test|setenv-test|edge-test|wakeup-test|curl-test)-" | awk '{print $2}' | while read ws_id; do
            if [ ! -z "$ws_id" ]; then
              echo "Deleting orphaned workspace: $ws_id"
              ./cs delete workspace -w $ws_id --yes || true
            fi
          done
          echo "Cleanup complete"
